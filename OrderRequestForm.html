<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Request Form</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom CSS for the Inter font - Tailwind's font-sans includes Inter by default */
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-r from-blue-500 to-purple-600 min-h-screen flex items-center justify-center p-4">

    <!-- Main container for the form, centered and responsive -->
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-2xl">
        <h2 class="text-3xl font-bold text-gray-800 mb-8 text-center">Place Your Order Request</h2>

        <!-- The form itself -->
        <form action="#" method="POST" class="space-y-6">
            <!-- Full Name Section -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="first-name" class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                    <input type="text" id="first-name" name="first-name" required
                           class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition duration-150 ease-in-out">
                </div>
                <div>
                    <label for="last-name" class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                    <input type="text" id="last-name" name="last-name" required
                           class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition duration-150 ease-in-out">
                </div>
            </div>

            <!-- Email ID Section -->
            <div>
                <label for="email-id" class="block text-sm font-medium text-gray-700 mb-1">Email ID</label>
                <input type="email" id="email-id" name="email-id" required
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition duration-150 ease-in-out">
            </div>

            <!-- Project Description Section -->
            <div>
                <label for="project-description" class="block text-sm font-medium text-gray-700 mb-1">Project Description</label>
                <textarea id="project-description" name="project-description" rows="6" required
                          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm resize-y transition duration-150 ease-in-out"
                          placeholder="Provide a detailed description of your project requirements, scope, and any specific features you need."></textarea>
            </div>

            <!-- Submit Button -->
            <div>
                <button type="submit"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-lg font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-200 ease-in-out transform hover:scale-105">
                    Submit Request
                </button>
                 <a href="index.html" class="art-link art-white-link art-w-chevron" onclick="showIntro()">Back to Home Page</a>
            </div>
        </form>
    </div>

</body>
</html>
